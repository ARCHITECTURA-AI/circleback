services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: circleback
      POSTGRES_USER: circleback
      POSTGRES_PASSWORD: circleback_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U circleback"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: "postgresql+asyncpg://circleback:circleback_dev@db:5432/circleback"
      DEBUG: "true"
      LOG_LEVEL: "DEBUG"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: uvicorn circleback.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
